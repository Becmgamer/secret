<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marca</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#0d0d0d;
    color:#fff;
}

header{
    height:65px;
    background:#161616;
    border-bottom:1px solid #333;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    font-weight:bold;
    letter-spacing:2px;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:#1a1a1a;
    border:1px solid #303030;
    border-radius:14px;
    padding:20px;
}

.card h2{
    margin-bottom:18px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#292929;
    color:#fff;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#fff;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ddd;
}

.menu{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.menu button{
    flex:1;
}

.lista{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.item{
    background:#242424;
    padding:12px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.item button{
    width:90px;
}
</style>
</head>

<body>

<header>Marca</header>

<div class="container">

<div class="menu">
<button>Buscar</button>
<button>Aqui</button>
</div>

<div class="grid">

<!-- LOGIN -->
<div class="card">
<h2>Login</h2>

<input type="password" placeholder="Senha">

<button>Entrar</button>

</div>

<!-- BUSCAR -->
<div class="card">
<h2>Buscar</h2>

<input placeholder="Pesquisar...">

<div class="lista">

<div class="item">
<span>Suco de Laranja</span>
<button>Abrir</button>
</div>

<div class="item">
<span>Suco de Maçã</span>
<button>Abrir</button>
</div>

</div>

</div>

<!-- ADICIONAR -->
<div class="card">
<h2>Adicionar</h2>

<input placeholder="Nome">

<input placeholder="URL">

<button>Adicionar</button>

</div>

<!-- EXCLUIR -->
<div class="card">
<h2>Excluir</h2>

<div class="lista">

<div class="item">
<span>Suco de Laranja</span>
<button>Excluir</button>
</div>

<div class="item">
<span>Suco de Maçã</span>
<button>Excluir</button>
</div>

</div>

</div>

<!-- EDITAR -->
<div class="card">
<h2>Editar</h2>

<div class="lista">

<div class="item">
<span>Suco de Laranja</span>
<button>Editar</button>
</div>

<div class="item">
<span>Suco de Maçã</span>
<button>Editar</button>
</div>

</div>

</div>

</div>

</div>

</body>
</html>
